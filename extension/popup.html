<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Phishing Detector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 380px;
      min-height: 200px;
      background: #0a0a0f;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 12px;
    }

    .header h1 {
      font-size: 16px;
      color: #22d3ee;
      font-weight: 700;
    }

    .url-box {
      background: #1e293b;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 12px;
      word-break: break-all;
      border: 1px solid #334155;
    }

    .btn {
      width: 100%;
      background: #06b6d4;
      color: #000;
      font-weight: 700;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: #22d3ee; }
    .btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

    .loading {
      text-align: center;
      color: #22d3ee;
      font-size: 13px;
      padding: 16px 0;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .result {
      margin-top: 14px;
      border-radius: 10px;
      padding: 14px;
      border: 1px solid;
    }

    .result.phishing {
      background: #2d0a0a;
      border-color: #ef4444;
    }

    .result.suspicious {
      background: #1a1500;
      border-color: #f59e0b;
    }

    .result.safe {
      background: #0a1f0a;
      border-color: #22c55e;
    }

    .verdict {
      font-size: 22px;
      font-weight: 900;
      text-align: center;
      margin-bottom: 10px;
    }

    .phishing .verdict { color: #ef4444; }
    .suspicious .verdict { color: #f59e0b; }
    .safe .verdict { color: #22c55e; }

    .score-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .score-bar {
      width: 100%;
      height: 8px;
      background: #1e293b;
      border-radius: 4px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .score-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .score-fill.red { background: #ef4444; }
    .score-fill.yellow { background: #f59e0b; }
    .score-fill.green { background: #22c55e; }

    .flags { margin-top: 8px; }
    .flags h3 {
      font-size: 11px;
      color: #f87171;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .flag-item {
      font-size: 11px;
      color: #cbd5e1;
      padding: 3px 0;
      display: flex;
      gap: 6px;
    }

    .flag-item span { color: #ef4444; }

    .scores-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .score-card {
      background: #0f172a;
      border-radius: 6px;
      padding: 8px;
      text-align: center;
    }

    .score-card .val {
      font-size: 18px;
      font-weight: 700;
      color: #22d3ee;
    }

    .score-card .val.purple { color: #a78bfa; }

    .score-card .label {
      font-size: 10px;
      color: #64748b;
      margin-top: 2px;
    }

    .error {
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #1e293b;
      border-top: 3px solid #22d3ee;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    }
  </style>
</head>
<body>

  <div class="header">
    <span style="font-size:20px">🛡️</span>
    <h1>Phishing Detector</h1>
  </div>

  <div class="url-box" id="urlBox">Detecting current tab URL...</div>

  <button class="btn" id="analyzeBtn" onclick="analyze()">
    🔍 Analyze This URL
  </button>

 <div class="loading" id="loading" style="display:none">
    <div class="spinner"></div>
    <div style="margin-top:10px;font-size:12px">Analyzing URL...</div>
  </div>

  <div id="result"></div>

  <script src="popup.js"></script>
</body>
</html>
